<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VERIFYSTACK | Register</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-container">

<div class="login-box">

<div class="logo">

VERIFYSTACK

</div>

<p class="subtitle">

Create Your Secure Account

</p>

<input
type="text"
id="fullname"
class="input"
placeholder="Full Name">

<input
type="email"
id="email"
class="input"
placeholder="Email Address">

<input
type="password"
id="password"
class="input"
placeholder="Password">

<input
type="password"
id="confirmPassword"
class="input"
placeholder="Confirm Password">

<button
id="registerBtn"
class="primary-btn">

Create Account

</button>

<div class="bottom-text">

Already have an account?

<a href="login.html">

Login

</a>

</div>

</div>

</div>

<script type="module" src="./auth.js"></script>

</body>

</html>
