<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Announcements</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<header class="top-bar">
<h2>📢 Admin Announcements</h2>
</header>

<div class="section">

<input
type="text"
id="title"
class="input"
placeholder="Announcement Title">

<br><br>

<textarea
id="message"
class="input"
rows="6"
placeholder="Write announcement here..."></textarea>

<br><br>

<button
class="primary-btn"
id="publishBtn">

📢 Publish Announcement

</button>

</div>

</div>

<script type="module" src="./admin-announcements.js"></script>

</body>

</html>
